name: Design System Version Bump

on:
  push:
    branches: [ main ]
    paths:
      - 'ds-tokens-latest.json'
      - 'ds-tokens-v*.json'
      - 'components/component-mapping.json'
      - 'tailwind.config.js'

jobs:
  version-bump:
    name: Bump Design System Version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get current version
        id: get-version
        run: |
          VERSION=$(node -p "require('./ds-tokens-latest.json')['\$version']")
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Bump patch version
        id: bump-version
        run: |
          CURRENT="${{ steps.get-version.outputs.current_version }}"
          IFS='.' read -ra PARTS <<< "$CURRENT"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in token files
        run: |
          NEW_VERSION="${{ steps.bump-version.outputs.new_version }}"
          DATE=$(date +%Y-%m-%dT%H:%M:%SZ)
          
          # Update ds-tokens-latest.json
          node -e "
            const fs = require('fs');
            const tokens = JSON.parse(fs.readFileSync('ds-tokens-latest.json', 'utf8'));
            tokens['\$version'] = '$NEW_VERSION';
            tokens['\$metadata']['exportedAt'] = '$DATE';
            fs.writeFileSync('ds-tokens-latest.json', JSON.stringify(tokens, null, 2));
          "
          
          echo "Updated ds-tokens-latest.json to v$NEW_VERSION"

      - name: Copy versioned token file
        run: |
          NEW_VERSION="${{ steps.bump-version.outputs.new_version }}"
          cp ds-tokens-latest.json "ds-tokens-v${NEW_VERSION}.json"
          echo "Created ds-tokens-v${NEW_VERSION}.json"

      - name: Commit version bump
        run: |
          NEW_VERSION="${{ steps.bump-version.outputs.new_version }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ds-tokens-latest.json "ds-tokens-v${NEW_VERSION}.json"
          git commit -m "chore: bump design system version to v${NEW_VERSION} [skip ci]"
          git push
          echo "Committed and pushed version bump to v$NEW_VERSION"

      - name: Create Git Tag
        run: |
          NEW_VERSION="${{ steps.bump-version.outputs.new_version }}"
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
          echo "Created tag v$NEW_VERSION"
